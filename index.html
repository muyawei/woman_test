<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>女神节抽奖器</title>
    <style>
        body {
            background-color: #fce4e4;
            font-family: 'Microsoft YaHei', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #d44b6b;
            font-size: 2.2em;
            margin-bottom: 20px;
        }
        .result-box {
            background-color: #fff0f2;
            border: 3px solid #b13e5c;
            border-radius: 20px;
            padding: 30px 20px;
            margin: 20px 0;
            font-size: 1.8em;
            color: #b13e5c;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background-color: #ffb6c1;
            border: none;
            border-radius: 50px;
            padding: 18px 30px;
            font-size: 1.8em;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 0 #ff8da1;
            transition: 0.1s ease;
            margin: 20px 0 30px;
            width: 80%;
            max-width: 300px;
            touch-action: manipulation;
            cursor: pointer;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #ff8da1;
        }
        .signature {
            color: #a55c71;
            font-size: 1.2em;
            margin-top: 20px;
        }
        /* 适配小屏 */
        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            .result-box { font-size: 1.5em; padding: 20px; }
            button { font-size: 1.5em; padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>❤️ 女神节快乐 ❤️</h1>
    <div class="result-box" id="result">点击下方按钮，抽取今日惊喜！</div>
    <button id="drawBtn">点击抽奖</button>
    <div class="signature">—— 来自宝贝的代码情书</div>

    <script>
        // 抽奖内容库（可自定义）
        const messages = [
            "🌸 给妈妈一个拥抱！",
            "💐 承包今晚洗碗！",
            "🍰 为妈妈做一张贺卡",
            "🎁 送妈妈一朵康乃馨",
            "✨ 今天不惹妈妈生气",
            "💖 帮妈妈按摩十分钟",
            "📖 给妈妈讲个笑话",
            "🥟 和妈妈一起包饺子",
            "🎵 为妈妈唱首歌",
            "🌟 永远爱妈妈！"
        ];

        const resultDiv = document.getElementById('result');
        const drawBtn = document.getElementById('drawBtn');

        drawBtn.addEventListener('click', function() {
            const randomIndex = Math.floor(Math.random() * messages.length);
            resultDiv.innerText = messages[randomIndex];
        });
    </script>
</body>
</html>
